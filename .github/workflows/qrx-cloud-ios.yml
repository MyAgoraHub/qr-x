name: EAS Cloud Build iOS

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: false
        default: 'preview'
        type: choice
        options:
          - preview
          - production
          - development

jobs:
  cloud-ios:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Expo and EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Trigger iOS cloud build (no wait)
        env:
          PROFILE: ${{ inputs.profile || 'preview' }}
        run: |
          set -e

          echo "Triggering iOS cloud build with profile '$PROFILE'..."
          BUILD_JSON="$(eas build --platform ios --profile "$PROFILE" --non-interactive --no-wait --json)"
          echo "$BUILD_JSON" > eas-build-ios.json

          BUILD_ID="$(node -e "const fs=require('fs'); const d=JSON.parse(fs.readFileSync('eas-build-ios.json','utf8')); console.log((Array.isArray(d)?d[0]:d).id || '');")"
          BUILD_URL="$(node -e "const fs=require('fs'); const d=JSON.parse(fs.readFileSync('eas-build-ios.json','utf8')); console.log((Array.isArray(d)?d[0]:d).webUrl || '');")"

          if [ -z "$BUILD_ID" ]; then
            echo "Failed to capture iOS build id"
            exit 1
          fi

          echo "iOS build id: $BUILD_ID"
          if [ -n "$BUILD_URL" ]; then
            echo "iOS build url: $BUILD_URL"
          fi
